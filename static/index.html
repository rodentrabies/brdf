<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BRDF Explorer - Bitcoin Transaction Graph</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="toolbar">
    <h1>BRDF Explorer</h1>

    <div class="controls">
      <div class="control-group">
        <input type="text" id="search-input" placeholder="txid or block height" />
        <button id="search-btn">Search</button>
      </div>

      <div class="separator"></div>

      <div class="control-group">
        <button class="icon-btn" id="random-btn" title="Random Transaction">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="2" width="20" height="20" rx="3"></rect>
            <circle cx="8"  cy="8"  r="1.5" fill="currentColor" stroke="none"></circle>
            <circle cx="16" cy="8"  r="1.5" fill="currentColor" stroke="none"></circle>
            <circle cx="8"  cy="16" r="1.5" fill="currentColor" stroke="none"></circle>
            <circle cx="16" cy="16" r="1.5" fill="currentColor" stroke="none"></circle>
            <circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"></circle>
          </svg>
        </button>
        <button class="icon-btn" id="clear-btn" title="Clear Graph">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="15" y1="9" x2="9" y2="15"></line>
            <line x1="9" y1="9" x2="15" y2="15"></line>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <div id="graph-container">
    <svg id="graph">
      <defs>
        <marker id="arrowhead" markerWidth="8" markerHeight="6"
                refX="8" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#888" />
        </marker>
      </defs>
      <g id="zoom-layer">
        <g id="links-layer"></g>
        <g id="nodes-layer"></g>
      </g>
    </svg>

    <div id="tooltip"></div>

    <div id="legend">
      <div class="legend-item">
        <div class="legend-dot" style="background:#f0a500;"></div>
        <span>Tx (expanded)</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#e94560;"></div>
        <span>Tx (click to expand)</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#2ecc71;"></div>
        <span>Output</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#9b59b6;"></div>
        <span>Block</span>
      </div>
    </div>
  </div>

  <div id="status">Ready.</div>

  <script type="module" src="app.js"></script>
</body>
</html>
